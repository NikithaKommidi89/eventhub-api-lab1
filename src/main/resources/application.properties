spring.application.name=eventhub-api
spring.profiles.active=dev
app.version=1.0.0

# =====================
# MySQL Database
# =====================
spring.datasource.url=jdbc:mysql://localhost:3306/eventhubdb
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=Nikitha@@89
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# =====================
# Flyway Migrations
# =====================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.jpa.hibernate.ddl-auto=update

# =====================
# Swagger / OpenAPI
# =====================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.packagesToScan=com.eventhub.api
springdoc.pathsToMatch=/api/**

# =====================
# Logging
# =====================
logging.level.com.eventhub=DEBUG
logging.level.org.springframework.cache=DEBUG
logging.file.name=logs/eventhub.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n


# =====================
# Jackson
# =====================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# JWT
jwt.secret=eventhub-secret-key-must-be-at-least-32-characters-long
jwt.expiration=86400000